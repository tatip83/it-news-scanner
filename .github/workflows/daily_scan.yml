name: Daily News Scan
on:
  schedule:
    - cron: '0 9 * * *' # Täglich 10 Uhr morgens
  workflow_dispatch: # Erlaubt manuellen Start per Klick
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - run: pip install feedparser
      - run: python it_scanner.py
      - name: Commit & Push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          # ÄNDERUNG: Nutze -f (force), um die ignorierte DB trotzdem zu speichern
          git add -f news_archive.db index.html
          git commit -m "Update News Archive" || echo "No changes to commit"
          git push
